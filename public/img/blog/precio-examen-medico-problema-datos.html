<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Precio Examen Médico</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(34, 211, 238, .25), transparent 34%),
        radial-gradient(circle at bottom right, rgba(52, 211, 153, .18), transparent 38%),
        #020617;
      color: #e5f7ff;
      overflow: hidden;
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(148, 163, 184, .08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, .08) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, black, transparent 92%);
    }
    .wrap {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: 68px 76px;
      display: grid;
      grid-template-columns: 1fr;
      align-content: center;
    }
    .eyebrow {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      padding: 10px 16px;
      border: 1px solid rgba(52, 211, 153, .4);
      border-radius: 999px;
      color: #6ee7b7;
      background: rgba(15, 23, 42, .72);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .02em;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 72px;
      line-height: 1.05;
      letter-spacing: -0.055em;
      margin: 0 0 26px;
      color: #f8fafc;
      max-width: 1000px;
    }
    .highlight { color: #34d399; }
    p {
      font-size: 32px;
      line-height: 1.32;
      color: #bfd7e4;
      margin: 0;
      max-width: 900px;
    }
    .footer {
      position: absolute;
      left: 76px;
      right: 76px;
      bottom: 36px;
      display: flex;
      justify-content: space-between;
      color: #94a3b8;
      font-size: 20px;
      letter-spacing: .02em;
    }
    .brand { color: #22d3ee; font-weight: 800; }
  </style>
</head>
<body>
  <div class="grid"></div>
  <main class="wrap">
    <section>
      <div class="eyebrow">Operaciones Clínicas · Laboratorios</div>
      <h1>El precio de un examen médico es un <span class="highlight">problema de datos</span></h1>
      <p>Cotizar por WhatsApp es lento y propenso a errores. Cómo Examya estructuró la intención médica para resolverlo en 10 segundos.</p>
    </section>
  </main>
  <div class="footer">
    <span>mariohealthbits.dev</span>
    <span class="brand">Examya</span>
  </div>
</body>
</html>
