<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fhirex by Examya — piloto FHIR sin producción</title>
  <style>
    body { margin: 0; background: #020617; }
    .wrap { width: 1200px; height: 630px; }
  </style>
</head>
<body>
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Fhirex by Examya: pilotos FHIR Core-CL sin tocar producción">
  <defs>
    <radialGradient id="cyanGlow" cx="18%" cy="16%" r="45%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.24" />
      <stop offset="75%" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="greenGlow" cx="83%" cy="12%" r="46%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22" />
      <stop offset="72%" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.35" />
    </filter>
    <style><![CDATA[
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 47px; font-weight: 850; fill: #f8fafc; letter-spacing: -1.2px; }
      .subtitle { font-size: 20px; fill: #cbd5e1; }
      .card { fill: rgba(15,23,42,0.94); stroke: rgba(148,163,184,0.34); stroke-width: 1.4; filter: url(#shadow); }
      .cyan { stroke: #22d3ee; }
      .green { stroke: #34d399; }
      .amber { stroke: #f59e0b; }
      .label { font-size: 19px; font-weight: 800; fill: #e2e8f0; }
      .small { font-size: 14.5px; fill: #94a3b8; }
      .tiny { font-size: 13px; fill: #64748b; }
      .pillText { font-size: 15px; font-weight: 800; fill: #a7f3d0; }
      .resource { font-size: 18px; font-weight: 850; fill: #f8fafc; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
      .node { fill: rgba(2,6,23,0.96); stroke: url(#accent); stroke-width: 2; filter: url(#shadow); }
    ]]></style>
  </defs>

  <rect width="1200" height="630" fill="#020617" />
  <rect width="1200" height="630" fill="url(#cyanGlow)" />
  <rect width="1200" height="630" fill="url(#greenGlow)" />
  <path d="M0 520 C270 468 430 588 660 520 C840 468 960 502 1200 438" fill="none" stroke="#0f172a" stroke-width="86" opacity="0.55" />

  <text x="70" y="75" class="font title">Fhirex by Examya</text>
  <text x="70" y="111" class="font subtitle">Pilotos FHIR/Core‑CL con datos sintéticos, auditoría y Provenance antes de producción.</text>
  <rect x="70" y="128" width="585" height="4" rx="2" fill="url(#accent)" />

  <rect x="70" y="170" width="250" height="145" rx="24" class="card amber" />
  <text x="95" y="210" class="font label">1 · Caso acotado</text>
  <text x="95" y="242" class="font small">orden médica</text>
  <text x="95" y="268" class="font small">resultado laboratorio</text>
  <text x="95" y="294" class="font small">atención clínica</text>

  <path d="M330 242 C370 242 392 242 432 242" class="arrow" />

  <rect x="445" y="170" width="280" height="145" rx="24" class="card cyan" />
  <text x="470" y="210" class="font label">2 · Datos sintéticos</text>
  <text x="470" y="242" class="font small">sin PII ni ficha real</text>
  <text x="470" y="268" class="font small">RUN/RUT de prueba</text>
  <text x="470" y="294" class="font small">validación TI segura</text>

  <path d="M735 242 C775 242 797 242 837 242" class="arrow" />

  <rect x="850" y="170" width="280" height="145" rx="24" class="card green" />
  <text x="875" y="210" class="font label">3 · Contrato FHIR</text>
  <text x="875" y="242" class="font small">R4 + Core‑CL</text>
  <text x="875" y="268" class="font small">FONASA / códigos</text>
  <text x="875" y="294" class="font small">REST + JSON</text>

  <circle cx="210" cy="430" r="62" class="node" />
  <text x="158" y="424" class="font resource">Patient</text>
  <text x="165" y="450" class="font small">Core‑CL</text>

  <circle cx="420" cy="430" r="62" class="node" />
  <text x="374" y="424" class="font resource" font-size="15">ServiceReq.</text>
  <text x="382" y="450" class="font small">orden</text>

  <circle cx="650" cy="430" r="62" class="node" />
  <text x="602" y="424" class="font resource" font-size="15">Observation</text>
  <text x="604" y="450" class="font small">resultado</text>

  <circle cx="890" cy="430" r="62" class="node" />
  <text x="845" y="424" class="font resource" font-size="15">DiagReport</text>
  <text x="851" y="450" class="font small">informe</text>

  <path d="M275 430 C305 430 330 430 355 430" class="arrow" />
  <path d="M485 430 C520 430 555 430 585 430" class="arrow" />
  <path d="M715 430 C755 430 785 430 825 430" class="arrow" />

  <rect x="984" y="380" width="145" height="100" rx="22" fill="rgba(15,23,42,0.94)" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)" />
  <text x="1012" y="420" class="font label">AuditEvent</text>
  <text x="1017" y="448" class="font small">Provenance</text>

  <rect x="70" y="546" width="515" height="45" rx="22" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.55)" />
  <text x="94" y="575" class="font pillText">Primero validar el contrato. Después hablar de producción.</text>

  <text x="790" y="575" class="font tiny">fhirex.examya.cl · FHIR R4 · Core‑CL · Piloto sin PII</text>
</svg>
</div>
</body>
</html>
