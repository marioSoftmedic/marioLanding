<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #020617;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    svg {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" style="background-color: #020617; font-family: 'JetBrains Mono', monospace, -apple-system, sans-serif;">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c" />
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Title -->
  <circle cx="280" cy="60" r="6" fill="#3b82f6" />
  <text x="300" y="66" fill="#f8fafc" font-size="24" font-weight="bold">Sales Engineering Context Pipeline</text>
  <text x="280" y="90" fill="#94a3b8" font-size="14">B2B HealthTech Deal Processing Flow</text>

  <!-- Diagram Background Box -->
  <rect x="100" y="120" width="1000" height="440" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>

  <!-- Stage 1 -->
  <rect x="140" y="160" width="220" height="360" rx="12" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="250" y="190" fill="#fbbf24" font-size="14" font-weight="bold" text-anchor="middle">1. RAW DATA OVERLOAD</text>

  <!-- Stage 1 components -->
  <rect x="165" y="230" width="170" height="60" rx="6" fill="#0f172a"/>
  <rect x="165" y="230" width="170" height="60" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="250" y="255" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Meeting Notes</text>
  <text x="250" y="275" fill="#94a3b8" font-size="10" text-anchor="middle">Messy medical context</text>

  <rect x="165" y="320" width="170" height="60" rx="6" fill="#0f172a"/>
  <rect x="165" y="320" width="170" height="60" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="250" y="345" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Legacy Diagrams</text>
  <text x="250" y="365" fill="#94a3b8" font-size="10" text-anchor="middle">Client architecture</text>

  <rect x="165" y="410" width="170" height="60" rx="6" fill="#0f172a"/>
  <rect x="165" y="410" width="170" height="60" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="250" y="435" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Technical PDFs</text>
  <text x="250" y="455" fill="#94a3b8" font-size="10" text-anchor="middle">Normativas MINSAL</text>

  <!-- Arrows -->
  <path d="M 360 340 L 460 340" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 720 340 L 820 340" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Stage 2 -->
  <rect x="460" y="230" width="260" height="240" rx="12" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="590" y="260" fill="#22d3ee" font-size="14" font-weight="bold" text-anchor="middle">2. SEMANTIC ENGINE</text>

  <!-- Stage 2 components -->
  <rect x="500" y="300" width="180" height="120" rx="6" fill="#0f172a"/>
  <rect x="500" y="300" width="180" height="120" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="590" y="335" fill="white" font-size="16" font-weight="bold" text-anchor="middle">NotebookLM</text>
  <text x="590" y="360" fill="#94a3b8" font-size="10" text-anchor="middle">Isolated Client Brain</text>
  <text x="590" y="385" fill="#22d3ee" font-size="10" text-anchor="middle">→ Extracts B2B Pain</text>
  <text x="590" y="405" fill="#22d3ee" font-size="10" text-anchor="middle">→ Generates Outlines</text>

  <!-- Stage 3 -->
  <rect x="820" y="190" width="240" height="320" rx="12" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="940" y="220" fill="#a78bfa" font-size="14" font-weight="bold" text-anchor="middle">3. PERMANENT MEMORY</text>

  <!-- Stage 3 components -->
  <rect x="850" y="260" width="180" height="80" rx="6" fill="#0f172a"/>
  <rect x="850" y="260" width="180" height="80" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="940" y="295" fill="white" font-size="14" font-weight="bold" text-anchor="middle">Obsidian Vault</text>
  <text x="940" y="320" fill="#94a3b8" font-size="10" text-anchor="middle">MDX Architecture Notes</text>

  <!-- Sync Arrow -->
  <path d="M 940 340 L 940 390" fill="none" stroke="#fb923c" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
  <rect x="895" y="355" width="90" height="20" rx="4" fill="#0f172a"/>
  <rect x="895" y="355" width="90" height="20" rx="4" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="940" y="369" fill="#fb923c" font-size="10" text-anchor="middle">Vector Sync</text>

  <rect x="850" y="400" width="180" height="80" rx="6" fill="#0f172a"/>
  <rect x="850" y="400" width="180" height="80" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="940" y="435" fill="white" font-size="14" font-weight="bold" text-anchor="middle">Engram DB</text>
  <text x="940" y="460" fill="#94a3b8" font-size="10" text-anchor="middle">Cross-project Patterns</text>

</svg>
</body>
</html>
