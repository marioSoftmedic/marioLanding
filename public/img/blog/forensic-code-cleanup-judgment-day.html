<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forensic Code Cleanup + Judgment Day</title>
    <style>
      body {
        margin: 0;
        background: #020617;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      .wrap {
        width: 1200px;
        height: 630px;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(34, 211, 238, 0.18),
            transparent 30%
          ),
          radial-gradient(
            circle at 80% 10%,
            rgba(52, 211, 153, 0.18),
            transparent 28%
          ),
          #020617;
      }
      svg {
        width: 1200px;
        height: 630px;
      }
      .title {
        font-size: 44px;
        font-weight: 800;
        fill: #f8fafc;
        letter-spacing: -1px;
      }
      .subtitle {
        font-size: 20px;
        fill: #94a3b8;
      }
      .box {
        fill: rgba(15, 23, 42, 0.92);
        stroke: rgba(148, 163, 184, 0.35);
        stroke-width: 1.5;
        rx: 24;
      }
      .good {
        stroke: #34d399;
      }
      .warn {
        stroke: #f59e0b;
      }
      .cyan {
        stroke: #22d3ee;
      }
      .label {
        font-size: 19px;
        font-weight: 700;
        fill: #e2e8f0;
      }
      .small {
        font-size: 15px;
        fill: #94a3b8;
      }
      .num {
        font-size: 34px;
        font-weight: 900;
        fill: #34d399;
      }
      .arrow {
        stroke: #64748b;
        stroke-width: 3;
        marker-end: url(#arrow);
        fill: none;
      }
      .badge {
        fill: rgba(52, 211, 153, 0.12);
        stroke: rgba(52, 211, 153, 0.55);
      }
      .badgeText {
        fill: #a7f3d0;
        font-size: 16px;
        font-weight: 700;
      }
      .credit {
        fill: #64748b;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <svg
        viewBox="0 0 1200 630"
        role="img"
        aria-label="Forensic Code Cleanup + Judgment Day workflow"
      >
        <defs>
          <marker
            id="arrow"
            markerWidth="10"
            markerHeight="10"
            refX="8"
            refY="3"
            orient="auto"
            markerUnits="strokeWidth"
          >
            <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
          </marker>
        </defs>

        <text x="70" y="78" class="title">Forensic Code Cleanup</text>
        <text x="70" y="110" class="subtitle">
          Grep primero. Borrar después. Revisar con Judgment Day sobre Gentle
          AI.
        </text>

        <rect
          x="70"
          y="150"
          width="250"
          height="145"
          class="box warn"
          rx="24"
        />
        <text x="95" y="190" class="label">Código zombie</text>
        <text x="95" y="222" class="small">7 handlers .cjs</text>
        <text x="95" y="248" class="small">14 test files con mocks</text>
        <text x="95" y="274" class="small">1 env var obsoleta</text>

        <path d="M330 222 C370 222, 390 222, 430 222" class="arrow" />

        <rect
          x="440"
          y="150"
          width="280"
          height="145"
          class="box cyan"
          rx="24"
        />
        <text x="465" y="190" class="label">Forensic pass</text>
        <text x="465" y="222" class="small">rg consumidores reales</text>
        <text x="465" y="248" class="small">separar harness vs producción</text>
        <text x="465" y="274" class="small">borrar solo sin referencias</text>

        <path d="M730 222 C770 222, 790 222, 830 222" class="arrow" />

        <rect
          x="840"
          y="150"
          width="290"
          height="145"
          class="box good"
          rx="24"
        />
        <text x="865" y="190" class="label">Judgment Day</text>
        <text x="865" y="222" class="small">Gentle AI / Alan Buscaglia</text>
        <text x="865" y="248" class="small">review adversarial en rounds</text>
        <text x="865" y="274" class="small">blockers antes del merge</text>

        <rect x="115" y="365" width="210" height="120" class="box" rx="22" />
        <text x="145" y="405" class="num">12</text>
        <text x="145" y="435" class="small">archivos eliminados</text>

        <rect x="380" y="365" width="210" height="120" class="box" rx="22" />
        <text x="410" y="405" class="num">108</text>
        <text x="410" y="435" class="small">líneas de mocks fuera</text>

        <rect x="645" y="365" width="210" height="120" class="box" rx="22" />
        <text x="675" y="405" class="num">1058</text>
        <text x="675" y="435" class="small">tests pasando</text>

        <rect x="910" y="365" width="210" height="120" class="box" rx="22" />
        <text x="940" y="405" class="num">0</text>
        <text x="940" y="435" class="small">blockers finales</text>

        <rect x="70" y="535" width="430" height="42" class="badge" rx="21" />
        <text x="92" y="562" class="badgeText">
          La mejor migración fue no migrar código muerto
        </text>

        <text x="790" y="565" class="credit">
          mariohealthbits.dev · Gentle AI:
          github.com/Gentleman-Programming/gentle-ai
        </text>
      </svg>
    </div>
  </body>
</html>
