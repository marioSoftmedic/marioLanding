<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShuriTraceLogger Architecture</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; background-color: #020617; color: #f8fafc; font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; }
        .diagram-container { width: 1200px; height: 630px; position: relative; background-color: #020617; overflow: hidden; border: 1px solid #1e293b; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="diagram-container">
        <svg viewBox="0 0 1200 630" width="100%" height="100%">
            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
                </pattern>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
                </marker>
                <marker id="arrowhead-auth" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185" />
                </marker>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" />
            
            <!-- Arrows drawn first so they are behind elements -->
            <!-- WhatsApp -> Orchestrator -->
            <path d="M 200 240 L 330 240" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
            
            <!-- Orchestrator -> LLM -->
            <path d="M 530 180 L 640 140" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
            <path d="M 640 160 L 530 200" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
            
            <!-- Orchestrator -> TraceLogger -->
            <path d="M 430 300 L 430 400" fill="none" stroke="#fb7185" stroke-dasharray="4,4" stroke-width="2" marker-end="url(#arrowhead-auth)"/>
            <text x="440" y="355" fill="#fb7185" font-size="12">logTransition()</text>
            
            <!-- TraceLogger -> PostgreSQL -->
            <path d="M 530 440 L 780 440" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
            <text x="655" y="430" fill="#94a3b8" font-size="12" text-anchor="middle">Insert Evidence</text>
            
            <!-- Regions -->
            <rect x="310" y="100" width="240" height="220" rx="12" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="8,4" />
            <text x="320" y="120" fill="#fbbf24" font-size="12" font-weight="600">Examya Core (NestJS)</text>
            
            <!-- Components -->
            <!-- Client -->
            <rect x="60" y="210" width="140" height="60" rx="6" fill="#0f172a" />
            <rect x="60" y="210" width="140" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5" />
            <text x="130" y="240" fill="white" font-size="14" font-weight="600" text-anchor="middle">WhatsApp</text>
            <text x="130" y="255" fill="#94a3b8" font-size="11" text-anchor="middle">Paciente</text>

            <!-- Orchestrator / State Machine -->
            <rect x="330" y="140" width="200" height="160" rx="6" fill="#0f172a" />
            <rect x="330" y="140" width="200" height="160" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5" />
            <text x="430" y="170" fill="white" font-size="16" font-weight="600" text-anchor="middle">ShuriStateMachine</text>
            <rect x="350" y="190" width="160" height="30" rx="4" fill="rgba(6, 78, 59, 0.6)" stroke="#34d399" stroke-width="1" />
            <text x="430" y="210" fill="white" font-size="12" text-anchor="middle">AWAITING_OCR</text>
            <rect x="350" y="230" width="160" height="30" rx="4" fill="rgba(6, 78, 59, 0.6)" stroke="#34d399" stroke-width="1" />
            <text x="430" y="250" fill="white" font-size="12" text-anchor="middle">MATCHING_CATALOG</text>

            <!-- LLM -->
            <rect x="640" y="120" width="180" height="80" rx="6" fill="#0f172a" />
            <rect x="640" y="120" width="180" height="80" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5" />
            <text x="730" y="155" fill="white" font-size="14" font-weight="600" text-anchor="middle">Gemini 1.5 Pro</text>
            <text x="730" y="175" fill="#94a3b8" font-size="11" text-anchor="middle">LLM Inference</text>

            <!-- TraceLogger -->
            <rect x="330" y="400" width="200" height="80" rx="6" fill="#0f172a" />
            <rect x="330" y="400" width="200" height="80" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5" />
            <text x="430" y="435" fill="white" font-size="16" font-weight="600" text-anchor="middle">ShuriTraceLogger</text>
            <text x="430" y="455" fill="#fb7185" font-size="11" text-anchor="middle">Forensic Audit Trail</text>

            <!-- DB -->
            <rect x="780" y="380" width="220" height="120" rx="6" fill="#0f172a" />
            <rect x="780" y="380" width="220" height="120" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5" />
            <text x="890" y="415" fill="white" font-size="16" font-weight="600" text-anchor="middle">PostgreSQL</text>
            <text x="890" y="435" fill="#a78bfa" font-size="11" text-anchor="middle">pgvector / JSONB</text>
            
            <rect x="800" y="450" width="180" height="30" rx="4" fill="rgba(76, 29, 149, 0.6)" stroke="#a78bfa" stroke-width="1" />
            <text x="890" y="470" fill="white" font-size="11" text-anchor="middle">{ promptHash, box, temp }</text>

            <!-- Title & Metadata -->
            <text x="40" y="50" fill="white" font-size="28" font-weight="700">Trust Engineering: ShuriTraceLogger</text>
            <text x="40" y="80" fill="#94a3b8" font-size="16">Architecture of forensic auditable AI transitions</text>
            
            <!-- Footer -->
            <text x="40" y="600" fill="#64748b" font-size="14">examya.cl | Trust Engineering Architecture</text>
            
            <!-- Pulse dot -->
            <circle cx="1140" cy="50" r="6" fill="#10b981" />
            <circle cx="1140" cy="50" r="12" fill="none" stroke="#10b981" stroke-width="2">
                <animate attributeName="r" values="6; 20; 6" dur="2s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="1; 0; 1" dur="2s" repeatCount="indefinite" />
            </circle>
            <text x="1115" y="55" fill="#10b981" font-size="14" font-weight="600" text-anchor="end">Live</text>
        </svg>
    </div>
</body>
</html>
