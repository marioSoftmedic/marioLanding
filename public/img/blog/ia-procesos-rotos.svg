<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">La IA no arregla procesos rotos: los acelera</title>
  <desc id="desc">Diagrama comparando un proceso roto automatizado con IA versus un proceso mapeado con reglas claras y trazabilidad.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0F"/>
      <stop offset="0.48" stop-color="#101827"/>
      <stop offset="1" stop-color="#071923"/>
    </linearGradient>
    <radialGradient id="orangeGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 280) rotate(45) scale(360 300)">
      <stop stop-color="#F97316" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(915 280) rotate(45) scale(360 300)">
      <stop stop-color="#06B6D4" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 44px 'Space Grotesk', Inter, system-ui, sans-serif; fill: #FAFAFA; letter-spacing: -1.5px; }
      .subtitle { font: 500 20px 'DM Sans', Inter, system-ui, sans-serif; fill: #A1A1AA; }
      .label { font: 700 24px 'Space Grotesk', Inter, system-ui, sans-serif; fill: #FAFAFA; }
      .small { font: 500 15px 'DM Sans', Inter, system-ui, sans-serif; fill: #D4D4D8; }
      .tiny { font: 500 13px 'JetBrains Mono', ui-monospace, monospace; fill: #A1A1AA; }
      .card { fill: rgba(22,22,34,0.88); stroke: rgba(255,255,255,0.10); }
      .broken { stroke: #F97316; }
      .ordered { stroke: #06B6D4; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orangeGlow)"/>
  <rect width="1200" height="630" fill="url(#cyanGlow)"/>

  <path d="M0 520 C170 450 260 590 420 510 C570 435 630 525 760 455 C920 370 1030 415 1200 330" stroke="#06B6D4" stroke-opacity="0.13" stroke-width="2"/>
  <path d="M0 105 C180 160 290 60 455 120 C650 190 755 35 950 95 C1055 128 1120 110 1200 80" stroke="#F97316" stroke-opacity="0.13" stroke-width="2"/>

  <text x="64" y="76" class="title">La IA no arregla procesos rotos.</text>
  <text x="64" y="112" class="subtitle">Los acelera. Primero ordena decisiones, datos y trazabilidad.</text>

  <g filter="url(#softShadow)">
    <rect x="64" y="165" width="500" height="360" rx="28" class="card"/>
    <rect x="636" y="165" width="500" height="360" rx="28" class="card"/>
  </g>

  <text x="102" y="215" class="label">Caos acelerado</text>
  <text x="674" y="215" class="label">IA útil</text>
  <text x="102" y="244" class="tiny">Proceso invisible + automatización</text>
  <text x="674" y="244" class="tiny">Proceso mapeado + reglas claras</text>

  <!-- Broken process -->
  <g transform="translate(102 278)">
    <rect x="0" y="0" width="138" height="66" rx="14" fill="#2A1A15" stroke="#F97316" stroke-opacity="0.55"/>
    <text x="18" y="28" class="small">Datos</text>
    <text x="18" y="49" class="tiny">fragmentados</text>

    <rect x="275" y="0" width="145" height="66" rx="14" fill="#2A1A15" stroke="#F97316" stroke-opacity="0.55"/>
    <text x="293" y="28" class="small">Decisiones</text>
    <text x="293" y="49" class="tiny">sin criterio</text>

    <rect x="62" y="145" width="145" height="66" rx="14" fill="#2A1A15" stroke="#F97316" stroke-opacity="0.55"/>
    <text x="80" y="173" class="small">Pasos</text>
    <text x="80" y="194" class="tiny">repetidos</text>

    <rect x="260" y="145" width="145" height="66" rx="14" fill="#2A1A15" stroke="#F97316" stroke-opacity="0.55"/>
    <text x="278" y="173" class="small">Trazabilidad</text>
    <text x="278" y="194" class="tiny">perdida</text>

    <path d="M140 34 C210 20 245 30 275 34" class="broken" stroke-width="3" stroke-dasharray="8 8"/>
    <path d="M333 66 C290 105 230 120 150 145" class="broken" stroke-width="3" stroke-dasharray="8 8"/>
    <path d="M207 176 C250 155 245 118 347 66" class="broken" stroke-width="3" stroke-dasharray="8 8"/>
    <path d="M136 66 C142 112 210 150 260 176" class="broken" stroke-width="3" stroke-dasharray="8 8"/>

    <circle cx="214" cy="102" r="38" fill="#3A2016" stroke="#F97316" stroke-width="2"/>
    <text x="191" y="111" font-family="Space Grotesk, Inter, sans-serif" font-size="28" font-weight="700" fill="#F97316">IA</text>
  </g>

  <!-- Ordered process -->
  <g transform="translate(674 282)">
    <rect x="0" y="0" width="132" height="64" rx="14" fill="#10242C" stroke="#06B6D4" stroke-opacity="0.65"/>
    <text x="18" y="28" class="small">Mapa</text>
    <text x="18" y="49" class="tiny">del flujo</text>

    <rect x="168" y="0" width="132" height="64" rx="14" fill="#10242C" stroke="#06B6D4" stroke-opacity="0.65"/>
    <text x="186" y="28" class="small">Reglas</text>
    <text x="186" y="49" class="tiny">claras</text>

    <rect x="336" y="0" width="132" height="64" rx="14" fill="#10242C" stroke="#06B6D4" stroke-opacity="0.65"/>
    <text x="354" y="28" class="small">Datos</text>
    <text x="354" y="49" class="tiny">trazables</text>

    <rect x="86" y="145" width="132" height="64" rx="14" fill="#10242C" stroke="#06B6D4" stroke-opacity="0.65"/>
    <text x="104" y="173" class="small">IA</text>
    <text x="104" y="194" class="tiny">asistida</text>

    <rect x="272" y="145" width="132" height="64" rx="14" fill="#10242C" stroke="#06B6D4" stroke-opacity="0.65"/>
    <text x="290" y="173" class="small">Decisión</text>
    <text x="290" y="194" class="tiny">auditable</text>

    <path d="M132 32 H168" class="ordered" stroke-width="4"/>
    <path d="M300 32 H336" class="ordered" stroke-width="4"/>
    <path d="M402 64 C385 105 345 130 338 145" class="ordered" stroke-width="4"/>
    <path d="M154 64 C155 98 152 120 152 145" class="ordered" stroke-width="4"/>
    <path d="M218 177 H272" class="ordered" stroke-width="4"/>

    <circle cx="234" cy="92" r="22" fill="#062C38" stroke="#06B6D4" stroke-width="2"/>
    <path d="M223 92 L231 100 L247 83" stroke="#22C55E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(64 560)">
    <rect width="1072" height="42" rx="21" fill="rgba(250,250,250,0.05)" stroke="rgba(255,255,255,0.08)"/>
    <text x="28" y="27" class="tiny">Antes del algoritmo: ¿quién decide, con qué datos, bajo qué reglas y dónde queda la evidencia?</text>
  </g>
</svg>
