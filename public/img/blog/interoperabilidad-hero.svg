<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Connection lines between nodes -->
  <g filter="url(#glow)">
    <!-- HL7v2 to Middleware -->
    <line x1="280" y1="260" x2="460" y2="315" stroke="url(#accent2)" stroke-width="2" stroke-dasharray="6 4"/>
    <!-- HL7v2 bottom to Middleware -->
    <line x1="280" y1="400" x2="460" y2="345" stroke="url(#accent2)" stroke-width="2" stroke-dasharray="6 4"/>
    <!-- Middleware to FHIR -->
    <line x1="620" y1="315" x2="760" y2="260" stroke="url(#accent)" stroke-width="2.5"/>
    <line x1="620" y1="330" x2="760" y2="330" stroke="url(#accent)" stroke-width="2.5"/>
    <line x1="620" y1="345" x2="760" y2="400" stroke="url(#accent)" stroke-width="2.5"/>
    <!-- FHIR to AI -->
    <line x1="920" y1="260" x2="1020" y2="290" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
    <line x1="920" y1="400" x2="1020" y2="370" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Legacy nodes (left) -->
  <g>
    <rect x="140" y="230" width="140" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="210" y="255" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">HL7 v2</text>
    <text x="210" y="275" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">ORU^R01</text>

    <rect x="140" y="370" width="140" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="210" y="395" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">CDA</text>
    <text x="210" y="415" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Legacy XML</text>
  </g>

  <!-- Middleware (center) - Examya -->
  <rect x="460" y="285" width="160" height="90" rx="12" fill="#0f172a" stroke="url(#accent)" stroke-width="2.5"/>
  <text x="540" y="320" text-anchor="middle" fill="#06b6d4" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Examya</text>
  <text x="540" y="342" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">IA + Middleware</text>
  <text x="540" y="362" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">OCR · NLP · AIToF</text>

  <!-- FHIR nodes (right) -->
  <g>
    <rect x="760" y="230" width="160" height="60" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="840" y="253" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="11">ServiceRequest</text>
    <text x="840" y="275" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">FHIR R4 + SNOMED</text>

    <rect x="760" y="300" width="160" height="60" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="840" y="323" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="11">DiagnosticReport</text>
    <text x="840" y="345" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">FHIR R4 + LOINC</text>

    <rect x="760" y="370" width="160" height="60" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="840" y="393" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="11">Patient</text>
    <text x="840" y="415" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">FHIR R4</text>
  </g>

  <!-- AI/MCP node (far right) -->
  <rect x="1000" y="280" width="120" height="100" rx="12" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1060" y="310" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">MCP Server</text>
  <text x="1060" y="332" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">AI Agents</text>
  <text x="1060" y="352" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">A2A Protocol</text>
  <text x="1060" y="372" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">AIToF Trace</text>

  <!-- Labels -->
  <text x="210" y="200" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="12" font-weight="600">LEGACY</text>
  <text x="840" y="200" text-anchor="middle" fill="#0e7490" font-family="system-ui, sans-serif" font-size="12" font-weight="600">FHIR R4</text>
  <text x="1060" y="250" text-anchor="middle" fill="#7c3aed" font-family="system-ui, sans-serif" font-size="12" font-weight="600">IA</text>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">Ley 21.668 — Interoperabilidad en Salud</text>
  <text x="600" y="115" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">De HL7 v2 a FHIR + IA: el camino de Examya</text>

  <!-- Chile flag accent -->
  <rect x="40" y="560" width="60" height="8" rx="4" fill="#D52B1E"/>
  <rect x="40" y="572" width="60" height="8" rx="4" fill="#FFFFFF" opacity="0.9"/>
  <rect x="40" y="584" width="60" height="8" rx="4" fill="#0039A6"/>
  <text x="115" y="580" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Chile 2026</text>

  <!-- Examya badge -->
  <text x="1160" y="580" text-anchor="end" fill="#334155" font-family="monospace" font-size="11">mariohealthbits.dev</text>
</svg>