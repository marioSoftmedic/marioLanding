<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación de Firmas Meta - Examya</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
    .header { margin-bottom: 2rem; text-align: center; }
    .title-row { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .dot { width: 12px; height: 12px; background: #fb7185; border-radius: 50%; box-shadow: 0 0 10px rgba(251, 113, 133, 0.5); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(251, 113, 133, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(251, 113, 133, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 113, 133, 0); } }
    h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.025em; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; }
    .diagram-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 2rem; margin-bottom: 2rem; width: 100%; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-row">
        <div class="dot"></div>
        <h1>Seguridad WhatsApp: Verificación de Origen</h1>
      </div>
      <div class="subtitle">Validación criptográfica HMAC-SHA256 en Examya API</div>
    </div>
    
    <div class="diagram-card">
      <svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
        </defs>
        
        <rect width="100%" height="100%" fill="url(#grid)" />
        
        <!-- Region Boundaries -->
        <rect x="50" y="50" width="220" height="280" rx="12" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="8,4" />
        <text x="160" y="80" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Meta / WhatsApp</text>
        
        <rect x="340" y="50" width="320" height="280" rx="12" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="8,4" />
        <text x="500" y="80" fill="#fb7185" font-size="12" font-weight="600" text-anchor="middle">Examya API (NestJS)</text>

        <rect x="730" y="50" width="220" height="280" rx="12" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="8,4" />
        <text x="840" y="80" fill="#34d399" font-size="12" font-weight="600" text-anchor="middle">Lógica de Negocio</text>
        
        <!-- Arrows -->
        <path d="M 230 180 L 370 180" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" />
        <text x="300" y="150" fill="#94a3b8" font-size="9" text-anchor="middle">Signed JSON Payload</text>
        <text x="300" y="165" fill="#22d3ee" font-size="8" text-anchor="middle">x-hub-signature-256</text>
        
        <path d="M 630 180 L 770 180" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" />
        <text x="700" y="170" fill="#34d399" font-size="9" text-anchor="middle">Verified Message</text>

        <!-- Component Boxes -->
        <!-- Meta Signer -->
        <rect x="90" y="150" width="140" height="60" rx="6" fill="#0f172a"/>
        <rect x="90" y="150" width="140" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="160" y="175" fill="white" font-size="11" font-weight="600" text-anchor="middle">Meta Signer</text>
        <text x="160" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">HMAC(Body, Secret)</text>
        
        <!-- Signature Validator -->
        <rect x="380" y="130" width="240" height="100" rx="6" fill="#0f172a"/>
        <rect x="380" y="130" width="240" height="100" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="500" y="155" fill="white" font-size="11" font-weight="600" text-anchor="middle">SignatureValidator</text>
        <text x="500" y="175" fill="#94a3b8" font-size="9" text-anchor="middle">1. Capture rawBody (Buffer)</text>
        <text x="500" y="190" fill="#94a3b8" font-size="9" text-anchor="middle">2. Re-compute HMAC</text>
        <text x="500" y="205" fill="#94a3b8" font-size="9" text-anchor="middle">3. Compare hashes</text>

        <!-- Business Logic -->
        <rect x="780" y="150" width="120" height="60" rx="6" fill="#0f172a"/>
        <rect x="780" y="150" width="120" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="840" y="175" fill="white" font-size="11" font-weight="600" text-anchor="middle">Shuri Agent</text>
        <text x="840" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">Trusted Context</text>

      </svg>
    </div>
  </div>
</body>
</html>
