<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.4"/>
    </pattern>

    <filter id="glow-ts" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-drizzle" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-pg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arr-w" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>

    <!-- TS glow circle -->
    <radialGradient id="glow-ts-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3178c6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3178c6" stop-opacity="0"/>
    </radialGradient>
    <!-- Drizzle glow -->
    <radialGradient id="glow-drizzle-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c5f74f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c5f74f" stop-opacity="0"/>
    </radialGradient>
    <!-- PG glow -->
    <radialGradient id="glow-pg-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#336791" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#336791" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
