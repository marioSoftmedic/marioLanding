  <text x="186" y="246" font-size="11" fill="#f78c6c">'content'</text>
  <text x="242" y="246" font-size="11" fill="#89ddff">)</text>
  <text x="248" y="246" font-size="11" fill="#c792ea">.notNull</text>
  <text x="305" y="246" font-size="11" fill="#89ddff">(),</text>

  <text x="100" y="262" font-size="11" fill="#eeffff">    embedding:</text>
  <text x="168" y="262" font-size="11" fill="#82aaff"> vector</text>
  <text x="210" y="262" font-size="11" fill="#89ddff">(</text>
  <text x="216" y="262" font-size="11" fill="#f78c6c">'embedding'</text>
