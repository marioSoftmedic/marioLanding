  <text x="80" y="246" font-size="10" fill="#334155">4</text>
  <text x="80" y="262" font-size="10" fill="#334155">5</text>
  <text x="80" y="278" font-size="10" fill="#334155">6</text>
  <text x="80" y="294" font-size="10" fill="#334155">7</text>
