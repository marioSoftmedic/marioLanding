<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1200" height="624">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#020617" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Title -->
  <text x="40" y="42" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">Pagos por WhatsApp · Examya</text>
  <text x="40" y="62" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="11">WhatsApp → OCR → FONASA → Mercado Pago / Stripe → confirmación en chat</text>

  <!-- ========== ARROWS (drawn first, behind boxes) ========== -->
  <!-- Row 1 horizontal chain (y=150) -->
  <line x1="180" y1="150" x2="220" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="360" y1="150" x2="400" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="540" y1="150" x2="580" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="720" y1="150" x2="760" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Router branches to payment providers -->
  <path d="M 810 180 Q 810 220 700 250" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <path d="M 900 180 Q 900 220 880 250" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Payment providers → webhook (amber confirmation path) -->
  <path d="M 680 310 Q 620 360 540 390" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead-amber)" />
  <path d="M 880 310 Q 780 360 600 390" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead-amber)" />

  <!-- Webhook → WhatsApp out -->
  <line x1="400" y1="420" x2="180" y2="420" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Context cache dashed connections (state) -->
  <line x1="135" y1="260" x2="135" y2="180" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="135" y1="320" x2="135" y2="390" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,4" />

  <!-- ========== BOXES ========== -->
  <!-- Row 1: WhatsApp In -->
  <rect x="40" y="120" width="140" height="60" rx="6" fill="#0f172a" />
  <rect x="40" y="120" width="140" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="110" y="145" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">WhatsApp</text>
  <text x="110" y="163" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">foto de orden</text>

  <!-- Row 1: Classifier -->
  <rect x="220" y="120" width="140" height="60" rx="6" fill="#0f172a" />
  <rect x="220" y="120" width="140" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="290" y="145" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">Clasificador</text>
  <text x="290" y="163" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">médico / tipo de doc</text>

  <!-- Row 1: OCR -->
  <rect x="400" y="120" width="140" height="60" rx="6" fill="#0f172a" />
  <rect x="400" y="120" width="140" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="470" y="145" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">OCR Engine</text>
  <text x="470" y="163" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">OpenAI Vision + local</text>

  <!-- Row 1: FONASA -->
  <rect x="580" y="120" width="140" height="60" rx="6" fill="#0f172a" />
  <rect x="580" y="120" width="140" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="650" y="145" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">FONASA Engine</text>
  <text x="650" y="163" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">tramo A / B / C / D</text>

  <!-- Row 1: Router -->
  <rect x="760" y="120" width="200" height="60" rx="6" fill="#0f172a" />
  <rect x="760" y="120" width="200" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="860" y="145" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">Payment Router</text>
  <text x="860" y="163" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">CLP → MP · else → Stripe</text>

  <!-- Row 2: Context Cache (left, violet dashed) -->
  <rect x="40" y="260" width="190" height="60" rx="6" fill="#0f172a" />
  <rect x="40" y="260" width="190" height="60" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="135" y="285" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">Context Cache</text>
  <text x="135" y="303" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">pending_ocr · estado por userId</text>

  <!-- Row 2: Mercado Pago -->
  <rect x="620" y="250" width="160" height="60" rx="6" fill="#0f172a" />
  <rect x="620" y="250" width="160" height="60" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="700" y="275" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">Mercado Pago</text>
  <text x="700" y="293" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">CLP · WhatsApp Business</text>

  <!-- Row 2: Stripe -->
  <rect x="800" y="250" width="160" height="60" rx="6" fill="#0f172a" />
  <rect x="800" y="250" width="160" height="60" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="880" y="275" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">Stripe</text>
  <text x="880" y="293" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">internacional (USD)</text>

  <!-- Row 3: Webhook Handler -->
  <rect x="400" y="390" width="200" height="60" rx="6" fill="#0f172a" />
  <rect x="400" y="390" width="200" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="500" y="415" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">Webhook Handler</text>
  <text x="500" y="433" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">confirma pago · libera servicio</text>

  <!-- Row 3: WhatsApp Out -->
  <rect x="40" y="390" width="140" height="60" rx="6" fill="#0f172a" />
  <rect x="40" y="390" width="140" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="110" y="415" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">WhatsApp</text>
  <text x="110" y="433" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">confirmación + PDF</text>

  <!-- Legend -->
  <g transform="translate(40, 480)">
    <rect x="0" y="-4" width="10" height="10" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
    <text x="16" y="5" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">frontend</text>

    <rect x="90" y="-4" width="10" height="10" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
    <text x="106" y="5" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">backend</text>

    <rect x="180" y="-4" width="10" height="10" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
    <text x="196" y="5" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">proveedor de pago</text>

    <rect x="320" y="-4" width="10" height="10" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="336" y="5" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">estado / cache</text>

    <line x1="430" y1="0" x2="450" y2="0" stroke="#fbbf24" stroke-width="1.5" />
    <text x="456" y="4" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">flujo de confirmación de pago</text>
  </g>
</svg>
