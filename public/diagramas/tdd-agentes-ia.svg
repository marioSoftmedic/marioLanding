<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
        </pattern>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
    </defs>
    <rect width="600" height="400" fill="#020617"/>
    <rect width="600" height="400" fill="url(#grid)"/>

    <!-- Agent -->
    <rect x="220" y="40" width="160" height="60" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="300" y="70" fill="white" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">Agente IA (Shuri)</text>
    <text x="300" y="85" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">LLM Probabilístico</text>

    <!-- The 4 Tests -->
    <!-- Unit -->
    <rect x="50" y="160" width="180" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
    <text x="140" y="190" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">1. Tests Unitarios</text>
    <text x="140" y="205" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Mocks reales de FONASA</text>

    <!-- Regression -->
    <rect x="370" y="160" width="180" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
    <text x="460" y="190" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">2. Regresión</text>
    <text x="460" y="205" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Validar slang médico</text>

    <!-- Integration -->
    <rect x="50" y="260" width="180" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
    <text x="140" y="290" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">3. Integración</text>
    <text x="140" y="305" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Flujos Stripe / WhatsApp</text>

    <!-- Load -->
    <rect x="370" y="260" width="180" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
    <text x="460" y="290" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">4. Tests de Carga</text>
    <text x="460" y="305" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Concurrencia masiva</text>

    <!-- Connections from Agent to Tests -->
    <path d="M 280 100 L 280 130 L 140 130 L 140 150" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <path d="M 320 100 L 320 130 L 460 130 L 460 150" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="140" y1="220" x2="140" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="460" y1="220" x2="460" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
</svg>