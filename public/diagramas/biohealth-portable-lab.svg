<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Grid -->
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
        </pattern>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
    </defs>
    <rect width="600" height="400" fill="#020617"/>
    <rect width="600" height="400" fill="url(#grid)"/>
    
    <!-- Módulos -->
    <rect x="50" y="50" width="150" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="125" y="80" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">Extracción RNA</text>
    <text x="125" y="95" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Microfluidos</text>

    <rect x="220" y="50" width="150" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="295" y="80" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">Termociclador</text>
    <text x="295" y="95" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">PCR Portable</text>

    <rect x="390" y="50" width="150" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="465" y="80" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">Sensor</text>
    <text x="465" y="95" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Fluorescencia</text>

    <!-- Energía -->
    <rect x="150" y="200" width="120" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
    <text x="210" y="235" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">Batería Litio</text>

    <!-- Conectividad -->
    <rect x="330" y="200" width="120" height="60" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="390" y="235" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">4G / Cloud</text>
    
    <!-- Conexiones -->
    <line x1="125" y1="110" x2="125" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="295" y1="110" x2="295" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="465" y1="110" x2="465" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
</svg>